<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Mini Games Platform</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎮</span>
        <span class="logo-text">MINI GAMES</span>
      </div>
      <div class="header-right">
        <div class="nickname-wrap">
          <input id="nicknameInput" class="nickname-input" type="text" placeholder="Your nickname…" maxlength="18">
        </div>
      </div>
    </div>
  </header>

  <!-- ── HERO ── -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1 class="hero-title">PLAY.<br>COMPETE.<br>WIN.</h1>
      <p class="hero-sub">5 games · Real-time multiplayer · No account needed</p>
    </div>
  </section>

  <!-- ── GAME GRID ── -->
  <main class="main-content">
    <div class="section-label">SELECT A GAME</div>
    <div id="gameGrid" class="game-grid">
      <!-- Populated by JS -->
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
      <div class="card-skeleton"></div>
    </div>
  </main>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast"></div>

  <script src="js/main.js"></script>
</body>
</html>

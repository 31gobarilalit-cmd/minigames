<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby — Mini Games</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/lobby.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="back-btn">← Back</a>
      <div class="logo"><span class="logo-icon">🎮</span><span class="logo-text">MINI GAMES</span></div>
      <div></div>
    </div>
  </header>

  <main class="lobby-main">

    <!-- ── Mode Selection ── -->
    <div id="modeSelect" class="panel">
      <div class="game-badge" id="gameBadge">🎲</div>
      <h2 id="gameTitle" class="panel-title">Loading…</h2>
      <p id="gameDesc" class="panel-desc"></p>
      <div class="mode-cards">
        <button class="mode-card" id="btnPublic">
          <span class="mode-icon">🌐</span>
          <span class="mode-name">Public Lobby</span>
          <span class="mode-hint">Auto-match with players</span>
        </button>
        <button class="mode-card" id="btnCreatePrivate">
          <span class="mode-icon">🔒</span>
          <span class="mode-name">Create Private</span>
          <span class="mode-hint">Generate a room code</span>
        </button>
        <button class="mode-card" id="btnJoinPrivate">
          <span class="mode-icon">🔑</span>
          <span class="mode-name">Join Private</span>
          <span class="mode-hint">Enter room code</span>
        </button>
      </div>
    </div>

    <!-- ── Create Private Form ── -->
    <div id="createPrivatePanel" class="panel hidden">
      <h2 class="panel-title">Create Private Room</h2>
      <div class="form-group">
        <label>Your Nickname</label>
        <input id="cpNickname" class="field" placeholder="Enter nickname" maxlength="18">
      </div>
      <div class="form-group">
        <label>Room Password <span class="hint">(optional)</span></label>
        <input id="cpPassword" class="field" type="password" placeholder="Set a password">
      </div>
      <button class="btn-primary" id="btnDoCreate">Create Room</button>
      <button class="btn-ghost" id="btnBackCreate">← Back</button>
    </div>

    <!-- ── Join Private Form ── -->
    <div id="joinPrivatePanel" class="panel hidden">
      <h2 class="panel-title">Join Private Room</h2>
      <div class="form-group">
        <label>Your Nickname</label>
        <input id="jpNickname" class="field" placeholder="Enter nickname" maxlength="18">
      </div>
      <div class="form-group">
        <label>Room ID</label>
        <input id="jpRoomId" class="field" placeholder="e.g. A3F9B2C1" maxlength="8" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label>Password <span class="hint">(if set)</span></label>
        <input id="jpPassword" class="field" type="password" placeholder="Room password">
      </div>
      <button class="btn-primary" id="btnDoJoin">Join Room</button>
      <button class="btn-ghost" id="btnBackJoin">← Back</button>
    </div>

    <!-- ── Public Nickname Form ── -->
    <div id="publicNickPanel" class="panel hidden">
      <h2 class="panel-title">Quick Match</h2>
      <div class="form-group">
        <label>Your Nickname</label>
        <input id="pubNickname" class="field" placeholder="Enter nickname" maxlength="18">
      </div>
      <button class="btn-primary" id="btnDoPublic">Find Match →</button>
      <button class="btn-ghost" id="btnBackPublic">← Back</button>
    </div>

    <!-- ── Waiting Lobby ── -->
    <div id="waitingPanel" class="panel hidden">
      <div class="room-info" id="roomInfo"></div>
      <h2 class="panel-title" id="waitingTitle">Waiting for players…</h2>
      <div class="player-slots" id="playerSlots"></div>
      <div class="lobby-footer">
        <button class="btn-secondary" id="btnReady">Ready Up</button>
        <div class="lobby-tip" id="lobbyTip">Game starts when all players are ready or lobby is full</div>
      </div>
      <div class="searching-anim" id="searchAnim">
        <span></span><span></span><span></span>
      </div>
    </div>

  </main>

  <div id="toast" class="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
